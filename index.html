<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belgian Politics Are Going Great</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #8b949e;
    --border: #30363d;
    --card: #161b22;
    --empty: #21262d;
    --l1: #4d0e0e;
    --l2: #8a1a1a;
    --l3: #c92a2a;
    --l4: #ff4d4d;
    --link: #58a6ff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --fg: #1f2328;
      --muted: #59636e;
      --border: #d0d7de;
      --card: #f6f8fa;
      --empty: #ebedf0;
      --l1: #ffd6d6;
      --l2: #ff8a8a;
      --l3: #e23b3b;
      --l4: #8a0a0a;
      --link: #0969da;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  header p {
    margin: 0 0 4px;
    color: var(--muted);
  }
  header a { color: var(--link); }
  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0 0;
    font-size: 12px;
    color: var(--muted);
  }
  .legend .swatches {
    display: flex;
    gap: 3px;
  }
  .swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .year {
    margin-top: 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
  }
  .year h2 {
    margin: 0 0 4px;
    font-size: 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .year h2 .count {
    font-size: 13px;
    color: var(--muted);
    font-weight: normal;
  }

  .heatmap {
    display: inline-grid;
    grid-template-columns: 28px 1fr;
    grid-template-rows: 18px 1fr;
    gap: 4px;
    margin-top: 12px;
  }
  .month-row {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 12px;
    gap: 3px;
    font-size: 10px;
    color: var(--muted);
    height: 14px;
    align-items: end;
  }
  .month-row span {
    grid-row: 1;
    white-space: nowrap;
  }
  .day-labels {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(7, 12px);
    gap: 3px;
    font-size: 10px;
    color: var(--muted);
    align-items: center;
    padding-right: 4px;
  }
  .day-labels span:nth-child(even) { visibility: visible; }
  .day-labels span:nth-child(odd) { visibility: hidden; }
  .grid {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(7, 12px);
    grid-auto-flow: column;
    grid-auto-columns: 12px;
    gap: 3px;
  }
  .cell {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    background: var(--empty);
    cursor: default;
  }
  .cell[data-count="1"] { background: var(--l1); cursor: pointer; }
  .cell[data-count="2"] { background: var(--l2); cursor: pointer; }
  .cell[data-count="3"] { background: var(--l3); cursor: pointer; }
  .cell[data-count="4"] { background: var(--l4); cursor: pointer; }
  .cell.placeholder { background: transparent; }
  .cell:focus { outline: 2px solid var(--link); outline-offset: 1px; }

  .tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    max-width: 360px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip.pinned { pointer-events: auto; border-color: var(--link); }
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: none;
  }
  .backdrop.visible { display: block; }
  .tooltip a {
    color: var(--link);
    text-decoration: underline;
    text-decoration-color: rgba(88, 166, 255, 0.4);
    text-underline-offset: 2px;
  }
  .tooltip a:hover {
    text-decoration-color: var(--link);
  }
  .tooltip .close {
    position: absolute;
    top: 4px;
    right: 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
  }
  .tooltip .close:hover { color: var(--fg); }
  .cell.pinned, .bar.pinned { outline: 2px solid var(--link); outline-offset: 1px; }
  .tooltip .date { color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .tooltip ul { margin: 0; padding-left: 16px; }
  .tooltip li { margin-bottom: 4px; }
  .tooltip li:last-child { margin-bottom: 0; }

  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  /* View toggle */
  .view-toggle {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    margin: 24px 0 0;
  }
  .view-toggle button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 14px;
    font: inherit;
    font-size: 13px;
    border-radius: 5px;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: var(--bg);
    color: var(--fg);
    box-shadow: 0 0 0 1px var(--border);
  }
  .view { display: none; }
  .view.active { display: block; }

  /* Status page */
  .components {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .components h3 {
    margin: 0;
    padding: 16px 24px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .component {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .component:last-child { border-bottom: none; }
  .component-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 10px;
  }
  .component-name {
    font-weight: 600;
    font-size: 15px;
  }
  .bars {
    display: flex;
    gap: 2px;
    height: 28px;
  }
  .bar {
    flex: 1;
    min-width: 2px;
    border-radius: 2px;
    background: #2ea043;
    cursor: default;
    transition: opacity 0.1s ease;
  }
  .bar:hover { opacity: 0.75; }
  .bar.b1 { background: #d29922; cursor: pointer; }
  .bar.b2 { background: #da3633; cursor: pointer; }
  .bar.b3 { background: #f85149; cursor: pointer; }
  .bar.b4 { background: #b91c1c; cursor: pointer; }
  .bar-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .uptime {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .uptime strong { color: var(--fg); }

  .recent {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }
  .recent h3 {
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .incident {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .incident:last-child { border-bottom: none; }
  .incident-date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .incident a { color: var(--link); text-decoration: none; }
  .incident a:hover { text-decoration: underline; }
</style>
</head>

const MONTHS_NL = ["jan", "feb", "mrt", "apr", "mei", "jun", "jul", "aug", "sep", "okt", "nov", "dec"];
const DAY_LABELS = ["Ma", "Di", "Wo", "Do", "Vr", "Za", "Zo"];

function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d));
}

function formatDateNL(d) {
  return `${d.getUTCDate()} ${MONTHS_NL[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

// Monday = 0 ... Sunday = 6
function dayIndex(d) {
  const js = d.getUTCDay();
  return (js + 6) % 7;
}

function buildIndex() {
  const byDate = new Map();
  for (const s of SCANDALS) {
    if (!byDate.has(s.date)) byDate.set(s.date, []);
    byDate.get(s.date).push(s);
  }
  return byDate;
}

function intensityFor(count) {
  if (count <= 0) return 0;
  if (count === 1) return 1;
  if (count === 2) return 2;
  if (count === 3) return 3;
  return 4;
}

function renderYear(year, byDate) {
  const yearStart = new Date(Date.UTC(year, 0, 1));
  const yearEnd = new Date(Date.UTC(year, 11, 31));

  // Pad to first Monday on or before Jan 1.
  const firstCell = new Date(yearStart);
  firstCell.setUTCDate(firstCell.getUTCDate() - dayIndex(yearStart));

  // Pad to last Sunday on or after Dec 31.
  const lastCell = new Date(yearEnd);
  lastCell.setUTCDate(lastCell.getUTCDate() + (6 - dayIndex(yearEnd)));

  const totalDays = Math.round((lastCell - firstCell) / 86400000) + 1;
  const totalWeeks = totalDays / 7;

  const wrapper = document.createElement("section");
  wrapper.className = "year";

  const heading = document.createElement("h2");
  const yearCount = SCANDALS.filter(s => s.date.startsWith(String(year))).length;
  heading.innerHTML = `${year} <span class="count">${yearCount} ${yearCount === 1 ? "incident" : "incidenten"}</span>`;
  wrapper.appendChild(heading);

  const heatmap = document.createElement("div");
  heatmap.className = "heatmap";

  // Month row: position labels at the column where each month starts within the year.
  const monthRow = document.createElement("div");
  monthRow.className = "month-row";
  monthRow.style.gridTemplateColumns = `repeat(${totalWeeks}, 12px)`;

  let lastMonthShown = -1;
  for (let w = 0; w < totalWeeks; w++) {
    const cellDate = new Date(firstCell);
    cellDate.setUTCDate(cellDate.getUTCDate() + w * 7);
    const monthOfWeekStart = cellDate.getUTCFullYear() === year ? cellDate.getUTCMonth() : -1;
    const span = document.createElement("span");
    span.style.gridColumn = `${w + 1}`;
    if (monthOfWeekStart !== -1 && monthOfWeekStart !== lastMonthShown && cellDate.getUTCDate() <= 7) {
      span.textContent = MONTHS_NL[monthOfWeekStart];
      lastMonthShown = monthOfWeekStart;
    }
    monthRow.appendChild(span);
  }
  heatmap.appendChild(monthRow);

  const dayLabels = document.createElement("div");
  dayLabels.className = "day-labels";
  for (const d of DAY_LABELS) {
    const s = document.createElement("span");
    s.textContent = d;
    dayLabels.appendChild(s);
  }
  heatmap.appendChild(dayLabels);

  const grid = document.createElement("div");
  grid.className = "grid";

  for (let i = 0; i < totalDays; i++) {
    const d = new Date(firstCell);
    d.setUTCDate(d.getUTCDate() + i);
    const cell = document.createElement("div");
    cell.className = "cell";
    if (d.getUTCFullYear() !== year) {
      cell.classList.add("placeholder");
      grid.appendChild(cell);
      continue;
    }
    const key = dateKey(d);
    const items = byDate.get(key) || [];
    if (items.length > 0) {
      cell.dataset.count = String(intensityFor(items.length));
      cell.dataset.date = key;
      cell.tabIndex = 0;
      cell.setAttribute("aria-label", `${key}: ${items.length} ${items.length === 1 ? "incident" : "incidenten"}`);
    } else {
      cell.setAttribute("aria-label", `${key}: geen incidenten`);
    }
    grid.appendChild(cell);
  }
  heatmap.appendChild(grid);
  wrapper.appendChild(heatmap);
  return wrapper;
}

const tooltip = document.getElementById("tooltip");
const backdrop = document.getElementById("backdrop");
let pinnedTarget = null;

function findNearestPinTarget(x, y, maxDist) {
  let best = null, bestDist = maxDist;
  for (const el of document.querySelectorAll(PIN_SELECTOR)) {
    const r = el.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) continue;
    const dx = Math.max(0, r.left - x, x - r.right);
    const dy = Math.max(0, r.top - y, y - r.bottom);
    const dist = Math.hypot(dx, dy);
    if (dist < bestDist) {
      best = el;
      bestDist = dist;
    }
  }
  return best;
}

// On mobile, heatmap cells (12px) and status bars (~6px) are smaller than the
// platform's tap-target threshold. iOS routes the click to the parent container
// instead of the cell. Intercept touchend, snap to the nearest pin target
// within a small radius, and suppress the synthesized click that follows.
let lastTouchHandled = 0;

document.addEventListener("touchend", e => {
  if (e.changedTouches.length !== 1) return;
  const t = e.changedTouches[0];
  const x = t.clientX, y = t.clientY;
  if (pinnedTarget && pointInRect(x, y, tooltip.getBoundingClientRect())) return;
  const target = findNearestPinTarget(x, y, 22);
  if (!target) return;
  e.preventDefault();
  lastTouchHandled = Date.now();
  if (pinnedTarget === target) {
    unpinTooltip();
  } else {
    pinTooltip(target);
  }
}, { passive: false });

function describeTarget(target) {
  // Returns { title, items } for the hovered/clicked element.
  if (target.dataset.date) {
    const key = target.dataset.date;
    const dateObj = parseDate(key);
    const title = `${dateObj.getUTCDate()} ${MONTHS_NL[dateObj.getUTCMonth()]} ${dateObj.getUTCFullYear()}`;
    const items = (byDate.get(key) || []).map(s => ({ ...s, _date: key }));
    return { title, items, withDate: false };
  }
  if (target.dataset.weekStart) {
    const startKey = target.dataset.weekStart;
    const endKey = target.dataset.weekEnd;
    const start = parseDate(startKey);
    const end = parseDate(endKey);
    const compName = target.closest(".component")?.querySelector(".component-name")?.textContent;
    const items = [];
    for (let d = new Date(start); d <= end; d.setUTCDate(d.getUTCDate() + 1)) {
      const dayItems = byDate.get(dateKey(d)) || [];
      for (const it of dayItems) {
        if (!compName || classifyIncident(it) === compName) items.push({ ...it, _date: dateKey(d) });
      }
    }
    const title = `${formatDateNL(start)} – ${formatDateNL(end)}`;
    return { title, items, withDate: true };
  }
  return null;
}

function tooltipHTML({ title, items, withDate }, { pinned = false } = {}) {
  const list = items.map(s => {
    const sd = parseDate(s._date);
    const datePrefix = withDate ? `<span style="color: var(--muted)">${sd.getUTCDate()} ${MONTHS_NL[sd.getUTCMonth()]}</span> · ` : "";
    return `<li>${datePrefix}<a href="${s.url}" target="_blank" rel="noopener">${escapeHTML(s.title)}</a></li>`;
  }).join("");
  const close = pinned ? `<button class="close" type="button" aria-label="Sluiten">&times;</button>` : "";
  return `${close}<div class="date">${title}</div><ul>${list}</ul>`;
}

function showTooltip(target, evt) {
  if (pinnedTarget) return;
  const desc = describeTarget(target);
  if (!desc) return;
  tooltip.innerHTML = tooltipHTML(desc);
  tooltip.classList.add("visible");
  positionTooltip(evt);
}

function pinTooltip(target) {
  const desc = describeTarget(target);
  if (!desc) return;
  if (pinnedTarget) pinnedTarget.classList.remove("pinned");
  pinnedTarget = target;
  target.classList.add("pinned");
  tooltip.innerHTML = tooltipHTML(desc, { pinned: true });
  tooltip.classList.add("visible", "pinned");
  backdrop.classList.add("visible");
  const rect = target.getBoundingClientRect();
  positionTooltip({ clientX: rect.left + rect.width / 2, clientY: rect.bottom });
}

function unpinTooltip() {
  if (pinnedTarget) pinnedTarget.classList.remove("pinned");
  pinnedTarget = null;
  tooltip.classList.remove("pinned");
  backdrop.classList.remove("visible");
  hideTooltip();
}

function positionTooltip(evt) {
  const pad = 12;
  const rect = tooltip.getBoundingClientRect();
  let x = evt.clientX + pad;
  let y = evt.clientY + pad;
  if (x + rect.width > window.innerWidth - 8) x = evt.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - 8) y = evt.clientY - rect.height - pad;
  tooltip.style.left = `${Math.max(8, x)}px`;
  tooltip.style.top = `${Math.max(8, y)}px`;
}

function hideTooltip() {
  if (pinnedTarget) return;
  tooltip.classList.remove("visible");
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

const byDate = buildIndex();

const years = Array.from(new Set(SCANDALS.map(s => Number(s.date.slice(0, 4))))).sort((a, b) => b - a);
const yearsContainer = document.getElementById("years");
for (const y of years) {
  yearsContainer.appendChild(renderYear(y, byDate));
}

const PIN_SELECTOR = ".cell[data-date], .bar[data-week-start]";

document.addEventListener("mouseover", e => {
  if (pinnedTarget) return;
  const target = e.target.closest(PIN_SELECTOR);
  if (target) showTooltip(target, e);
});
document.addEventListener("mousemove", e => {
  if (pinnedTarget) return;
  if (tooltip.classList.contains("visible")) positionTooltip(e);
});
document.addEventListener("mouseout", e => {
  if (pinnedTarget) return;
  if (e.target.closest(PIN_SELECTOR)) hideTooltip();
});
document.addEventListener("focusin", e => {
  if (pinnedTarget) return;
  const target = e.target.closest(PIN_SELECTOR);
  if (target) {
    const rect = target.getBoundingClientRect();
    showTooltip(target, { clientX: rect.left + rect.width / 2, clientY: rect.top });
  }
});
document.addEventListener("focusout", e => {
  if (pinnedTarget) return;
  if (e.target.closest(PIN_SELECTOR)) hideTooltip();
});

function pointInRect(x, y, r) {
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

// All clicks while pinned go through the backdrop (which sits between the page
// and the tooltip in z-order). Visual hit-tests against the tooltip's actual
// bounding rect avoid relying on iOS honoring `pointer-events: auto` for
// synthesized clicks.
backdrop.addEventListener("click", e => {
  const x = e.clientX, y = e.clientY;
  if (pointInRect(x, y, tooltip.getBoundingClientRect())) {
    for (const link of tooltip.querySelectorAll("a")) {
      if (pointInRect(x, y, link.getBoundingClientRect())) {
        window.open(link.href, "_blank", "noopener");
        return;
      }
    }
    const closeBtn = tooltip.querySelector(".close");
    if (closeBtn && pointInRect(x, y, closeBtn.getBoundingClientRect())) {
      unpinTooltip();
    }
    return;
  }
  const beneath = document.elementsFromPoint(x, y).find(el => el.matches?.(PIN_SELECTOR));
  if (beneath && beneath !== pinnedTarget) {
    pinTooltip(beneath);
    return;
  }
  unpinTooltip();
});

// Desktop / cases where iOS routes correctly: the tooltip catches the click
// itself, so handle close + stop propagation to the document.
tooltip.addEventListener("click", e => {
  e.stopPropagation();
  if (e.target.closest(".close")) unpinTooltip();
});

document.addEventListener("click", e => {
  // The touchend handler already pinned/unpinned for this gesture; suppress
  // the synthesized click that follows so we don't toggle twice.
  if (Date.now() - lastTouchHandled < 600) {
    e.preventDefault();
    return;
  }
  const target = e.target.closest(PIN_SELECTOR);
  if (!target) return;
  e.preventDefault();
  if (pinnedTarget === target) {
    unpinTooltip();
  } else {
    pinTooltip(target);
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && pinnedTarget) unpinTooltip();
});

// ---------- Status page view ----------

const COMPONENTS = [
  {
    name: "Federale regering & Kamer",
    keywords: ["kamer", "minister", "staatssecretaris", "federaal", "michel", "de sutter", "lalieux", "schlitz", "francken", "verlinden", "van quickenborne", "bracke", "de croo", "pensioen", "bpost", "defensie", "antidrone", "drones", "i-police", "ipolice"],
  },
  {
    name: "Lokale besturen",
    keywords: ["burgemeester", "schepen", "ocmw", "gemeente", "haaltert", "boechout", "herent", "knokke", "wielsbeke", "oostende", "koksijde", "beveren", "verviers", "ninove", "oudenburg", "anderlecht", "heuvelland", "brugge", "aalter", "sint-truiden", "middelkerke", "heers", "staden", "meulebeke", "genk"],
  },
  {
    name: "Justitie & corruptie",
    keywords: ["reynders", "witwas", "qatar", "tarabella", "samusocial", "rechtbank", "parket", "hof van beroep", "huiszoeking", "verdenking", "veroordeling", "fraude", "verkiezingsfraude", "ing"],
  },
];

function classifyIncident(s) {
  const haystack = s.title.toLowerCase();
  for (const comp of COMPONENTS) {
    if (comp.keywords.some(k => haystack.includes(k))) return comp.name;
  }
  return COMPONENTS[0].name;
}

function severityClass(count) {
  if (count <= 0) return "";
  if (count === 1) return "b1";
  if (count === 2) return "b2";
  if (count <= 4) return "b3";
  return "b4";
}

function todayUTC() {
  const n = new Date();
  return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate()));
}

function renderBars(container, weeks, byDate, perComponent) {
  // Each bar covers a 7-day window ending on `today` (most recent bar).
  const today = todayUTC();

  let totalIncidentWeeks = 0;
  let totalIncidents = 0;

  for (let w = weeks - 1; w >= 0; w--) {
    const weekEnd = new Date(today);
    weekEnd.setUTCDate(weekEnd.getUTCDate() - w * 7);
    const weekStart = new Date(weekEnd);
    weekStart.setUTCDate(weekStart.getUTCDate() - 6);

    const items = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setUTCDate(d.getUTCDate() + i);
      const key = dateKey(d);
      const dayItems = byDate.get(key) || [];
      for (const it of dayItems) {
        if (!perComponent || classifyIncident(it) === perComponent) items.push(it);
      }
    }

    const cls = severityClass(items.length);
    if (items.length > 0) {
      totalIncidentWeeks++;
      totalIncidents += items.length;
    }
    const bar = document.createElement("div");
    bar.className = "bar" + (cls ? " " + cls : "");
    const range = `${dateKey(weekStart)} – ${dateKey(weekEnd)}`;
    if (items.length > 0) {
      bar.dataset.weekStart = dateKey(weekStart);
      bar.dataset.weekEnd = dateKey(weekEnd);
      bar.tabIndex = 0;
      bar.setAttribute("aria-label", `${range}: ${items.length} ${items.length === 1 ? "incident" : "incidenten"}`);
    } else {
      bar.setAttribute("aria-label", `${range}: geen incidenten`);
    }
    container.appendChild(bar);
  }

  return { totalIncidentWeeks, totalIncidents };
}

function renderStatusPage() {
  const weeks = 52;

  document.querySelector(".components h3").textContent = `Componenten — laatste ${weeks} weken`;

  const componentsEl = document.getElementById("components");
  componentsEl.innerHTML = "";
  for (const comp of COMPONENTS) {
    const wrapper = document.createElement("div");
    wrapper.className = "component";

    const head = document.createElement("div");
    head.className = "component-head";
    head.innerHTML = `<span class="component-name">${comp.name}</span>`;
    wrapper.appendChild(head);

    const bars = document.createElement("div");
    bars.className = "bars";
    wrapper.appendChild(bars);

    const axis = document.createElement("div");
    axis.className = "bar-axis";
    axis.innerHTML = `<span>${weeks} weken geleden</span><span>deze week</span>`;
    wrapper.appendChild(axis);

    const uptime = document.createElement("div");
    uptime.className = "uptime";
    wrapper.appendChild(uptime);

    componentsEl.appendChild(wrapper);

    const { totalIncidentWeeks, totalIncidents } = renderBars(bars, weeks, byDate, comp.name);
    const cleanWeeks = weeks - totalIncidentWeeks;
    const pct = ((cleanWeeks / weeks) * 100).toFixed(1);

    uptime.innerHTML = `<strong>${pct}%</strong> incidentvrije weken · ${totalIncidents} ${totalIncidents === 1 ? "incident" : "incidenten"} over ${weeks} weken`;
  }

  // Recent incidents — last 10
  const recent = [...SCANDALS].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
  const recentEl = document.getElementById("recent-incidents");
  recentEl.innerHTML = "";
  for (const s of recent) {
    const d = parseDate(s.date);
    const formatted = `${d.getUTCDate()} ${MONTHS_NL[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
    const incident = document.createElement("div");
    incident.className = "incident";
    incident.innerHTML = `
      <div class="incident-date">${formatted} · ${classifyIncident(s)}</div>
      <a href="${s.url}" target="_blank" rel="noopener">${escapeHTML(s.title)}</a>
    `;
    recentEl.appendChild(incident);
  }
}

renderStatusPage();

// View toggle
const toggleButtons = document.querySelectorAll(".view-toggle button");
toggleButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    toggleButtons.forEach(b => b.classList.toggle("active", b === btn));
    const target = btn.dataset.view;
    document.querySelectorAll(".view").forEach(v => {
      v.classList.toggle("active", v.id === `view-${target}`);
    });
  });
});
</script>
</body>
</html>
